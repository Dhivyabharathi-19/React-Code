<!-- // Write a React functional component that uses useState to maintain a boolean
login status and useEffect to log “User logged in” when the state is true and
“User logged out” when the state is false, with a button to toggle the login
state. -->
<!doctype html>
<html>
  <head>
    <title>React Basics</title>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  </head>

  <body>
    <div class="js-container"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      function LoginToggle() {
        const [isLoggedIn, setIsLoggedIn] = useState(false);

        useEffect(() => {
          if (isLoggedIn) {
            console.log("User logged in");
          } else {
            console.log("User logged out");
          }
        }, [isLoggedIn]);

        return (
          <div>
            <h2>{isLoggedIn ? "Logged In" : "Logged Out"}</h2>
            <button onClick={() => setIsLoggedIn(!isLoggedIn)}>
              Toggle Login
            </button>
          </div>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<LoginToggle />);
    </script>
  </body>
</html>
